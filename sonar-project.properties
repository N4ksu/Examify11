sonar.projectKey=N4ksu_Examify11
sonar.organization=n4ksu
sonar.host.url=https://sonarcloud.io

# Keep the source roots
sonar.sources=examify_flutter/lib,examify-backend/app

# Exclude EVERYTHING from analysis
sonar.exclusions=examify_flutter/**,examify-backend/**,**/test/**,**/vendor/**,**/node_modules/**,**/build/**,**/.dart_tool/**

sonar.sourceEncoding=UTF-8

# Optional report paths
sonar.dart.lcov.reportPaths=examify_flutter/coverage/lcov.info
sonar.php.coverage.reportPaths=examify-backend/coverage.xml

# Exclude EVERYTHING from coverage
sonar.coverage.exclusions=examify_flutter/**,examify-backend/**

# Exclude EVERYTHING from duplication
sonar.cpd.exclusions=examify_flutter/**,examify-backend/**
