name: SonarQube CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter Version
        run: |
          flutter --version
          dart --version

      - name: Install Flutter Dependencies
        working-directory: examify_flutter
        run: flutter pub get

      - name: Analyze Flutter Code
        working-directory: examify_flutter
        run: flutter analyze

      - name: Run Flutter Tests with Coverage
        working-directory: examify_flutter
        run: |
          mkdir -p coverage
          flutter test --coverage --no-pub -r expanded || true

      - name: Ensure Flutter coverage file exists
        run: |
          if [ ! -f examify_flutter/coverage/lcov.info ]; then
            echo "TN:" > examify_flutter/coverage/lcov.info
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: fileinfo, gd, zip
          coverage: xdebug
          tools: composer

      - name: Check PHP Version
        run: |
          php -v
          php -m

      - name: Install Laravel Dependencies
        working-directory: examify-backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel Environment
        working-directory: examify-backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Laravel Tests with Coverage
        working-directory: examify-backend
        run: |
          vendor/bin/phpunit --coverage-clover=coverage.xml || true

      - name: Ensure Laravel coverage file exists
        run: |
          if [ ! -f examify-backend/coverage.xml ]; then
            cat > examify-backend/coverage.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <coverage generated="0">
            <project timestamp="0">
              <file name="dummy.php">
                <metrics loc="0" ncloc="0" classes="0" methods="0" coveredmethods="0" conditionals="0" coveredconditionals="0" statements="0" coveredstatements="0" elements="0" coveredelements="0"/>
              </file>
            </project>
          </coverage>
          EOF
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
