name: SonarQube CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # FLUTTER
      # -----------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter Version
        run: |
          flutter --version
          dart --version

      - name: Install Flutter Dependencies
        working-directory: examify_flutter
        run: flutter pub get

      - name: Analyze Flutter Code
        working-directory: examify_flutter
        run: flutter analyze

      - name: Run Flutter Tests with Coverage
        working-directory: examify_flutter
        run: flutter test --coverage --no-pub -r expanded
        continue-on-error: true

      - name: Check Flutter Coverage File
        run: |
          echo "Checking Flutter coverage file..."
          ls -la examify_flutter/coverage || true
          test -f examify_flutter/coverage/lcov.info

      # -----------------------------
      # PHP / LARAVEL
      # -----------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: fileinfo, gd, zip
          coverage: xdebug
          tools: composer

      - name: Check PHP Version
        run: |
          php -v
          php -m

      - name: Install Laravel Dependencies
        working-directory: examify-backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel Environment
        working-directory: examify-backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Laravel Tests with Coverage
        working-directory: examify-backend
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Check Laravel Coverage File
        run: |
          echo "Checking Laravel coverage file..."
          ls -la examify-backend || true
          test -f examify-backend/coverage.xml

      # -----------------------------
      # SONAR
      # -----------------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
